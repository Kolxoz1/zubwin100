<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZUBWIN100</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050505;
color:#fff;
}

.hero{
position:relative;
height:500px;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.85));
}

.hero-content{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
width:90%;
}

.hero-content h1{
font-size:72px;
font-weight:900;
}

.hero-content p{
font-size:24px;
margin-top:10px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
margin-top:-60px;
position:relative;
z-index:3;
}

.promo{
background:#0f172a;
border-radius:25px;
padding:30px;
text-align:center;
border:2px solid #2563eb;
}

.code{
font-size:60px;
font-weight:bold;
color:#ffd700;
margin-top:10px;
}

.btn{
display:block;
text-decoration:none;
background:#16a34a;
color:white;
padding:20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
margin-top:20px;
text-align:center;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#111;
padding:25px;
border-radius:18px;
text-align:center;
}

.footer{
text-align:center;
padding:40px;
color:#888;
}

@media(max-width:768px){

.hero{
height:320px;
}

.hero-content h1{
font-size:42px;
}

.hero-content p{
font-size:18px;
}

.code{
font-size:38px;
}

.btn{
font-size:22px;
}

}
</style>
</head>

<body>

<div class="hero">
<img src="header.jpg" alt="">
<div class="hero-content">
<h1>ZUBWIN100</h1>
<p>Используй промокод при регистрации</p>
</div>
</div>

<div class="container">

<div class="promo">
<h2>ПРОМОКОД</h2>
<div class="code">ZUBWIN100</div>
</div>

<a class="btn" href="ТВОЯ_ССЫЛКА_ЗДЕСЬ">
🎁 ПОЛУЧИТЬ БОНУС
</a>

<div class="features">

<div class="card">
<h3>🎁 Бонусы</h3>
<p>Специальные предложения</p>
</div>

<div class="card">
<h3>⚡ Быстро</h3>
<p>Моментальный доступ</p>
</div>

<div class="card">
<h3>💎 VIP</h3>
<p>Эксклюзивные возможности</p>
</div>

</div>

</div>

<div class="footer">
© ZUBWIN100
</div>

</body>
</html>
