<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZUBWIN100</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#090909;
    color:white;
    text-align:center;
}

.hero img{
    width:100%;
    max-height:500px;
    object-fit:cover;
}

.container{
    max-width:700px;
    margin:auto;
    padding:25px;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    color:#bfbfbf;
    margin-bottom:25px;
}

.promo{
    background:#111827;
    border:2px solid #2563eb;
    border-radius:20px;
    padding:20px;
    margin-bottom:25px;
}

.code{
    font-size:42px;
    font-weight:bold;
    color:#ffd700;
    margin-top:10px;
}

.btn{
    display:block;
    text-decoration:none;
    background:#16a34a;
    color:white;
    padding:18px;
    border-radius:16px;
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:#161616;
    border-radius:16px;
    padding:20px;
}

.card h3{
    margin-bottom:10px;
}

.footer{
    margin-top:40px;
    color:#888;
    font-size:14px;
}
</style>
</head>

<body>

<div class="hero">
    <img src="header.jpg" alt="">
</div>

<div class="container">

    <h1>ZUBWIN100</h1>

    <p class="subtitle">
        Используй промокод при регистрации
    </p>

    <div class="promo">
        <div>ПРОМОКОД</div>
        <div class="code">ZUBWIN100</div>
    </div>

    <a class="btn" href="ТВОЯ_ССЫЛКА_ЗДЕСЬ">
        🎁 Получить бонус
    </a>

    <div class="features">

        <div class="card">
            <h3>🎁 Бонусы</h3>
            <p>Специальные предложения</p>
        </div>

        <div class="card">
            <h3>⚡ Быстро</h3>
            <p>Моментальный доступ</p>
        </div>

        <div class="card">
            <h3>💎 VIP</h3>
            <p>Эксклюзивные возможности</p>
        </div>

    </div>

    <div class="footer">
        © ZUBWIN100
    </div>

</div>

</body>
</html>
