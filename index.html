<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Landing</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Arial,sans-serif;
color:white;
text-align:center;
}

.hero{
position:relative;
}

.hero img{
width:100%;
display:block;
}

.hero::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
height:120px;
background:linear-gradient(to bottom,rgba(0,0,0,0),#050505);
}

.container{
max-width:760px;
margin:auto;
padding:0 20px 40px;
margin-top:-50px;
position:relative;
z-index:10;
}

.btn{
display:block;
width:100%;
padding:24px;
font-size:32px;
font-weight:700;
text-decoration:none;
color:white;
background:linear-gradient(135deg,#2563eb,#3b82f6);
border-radius:22px;
box-shadow:0 15px 40px rgba(59,130,246,.3);
}

.info{
margin-top:20px;
background:#0f172a;
border-radius:20px;
padding:25px;
border:1px solid rgba(255,255,255,.08);
}

.label{
font-size:14px;
letter-spacing:2px;
color:#94a3b8;
margin-bottom:10px;
}

.code{
font-size:42px;
font-weight:900;
}

.copy{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:700;
}

.footer{
margin-top:30px;
color:#777;
font-size:14px;
}

@media(max-width:768px){
.code{
font-size:32px;
}

.btn{
font-size:24px;
padding:18px;
}
}
</style>
</head>

<body>

<div class="hero">
<img src="header.jpg" alt="">
</div>

<div class="container">

<a class="btn" href="#">
🚀 Открыть страницу
</a>

<div class="info">
<div class="label">КОД</div>
<div class="code" id="code">ACCESS2026</div>

<button class="copy" onclick="copyCode()">
Скопировать код
</button>
</div>

<div class="footer">
© 2026
</div>

</div>

<script>
function copyCode(){
navigator.clipboard.writeText(
document.getElementById('code').innerText
);
alert('Код скопирован');
}
</script>

</body>
</html>
